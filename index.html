<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#5b6cff" />
  <title>个人双分区记录工具</title>
  <style>
    :root {
      --bg1: #f7f8ff;
      --bg2: #eefaf7;
      --card: rgba(255, 255, 255, 0.82);
      --card-strong: rgba(255, 255, 255, 0.96);
      --text: #1f2a44;
      --muted: #7b879c;
      --line: rgba(148, 163, 184, 0.20);
      --primary: #5b6cff;
      --primary-2: #7c5cff;
      --idea: #8b5cf6;
      --idea-soft: rgba(139, 92, 246, 0.10);
      --exp: #14b8a6;
      --exp-soft: rgba(20, 184, 166, 0.10);
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --shadow: 0 10px 30px rgba(91, 108, 255, 0.10);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(91, 108, 255, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(20, 184, 166, 0.14), transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      padding: max(16px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--primary) 0%, var(--exp) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .clock {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .stat-box {
      background: var(--card-strong);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .mobile-quick-nav {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      position: sticky;
      top: calc(env(safe-area-inset-top) + 8px);
      z-index: 20;
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .pill-idea {
      color: var(--idea);
      background: var(--idea-soft);
      border-color: rgba(139, 92, 246, 0.18);
    }

    .pill-exp {
      color: #0f766e;
      background: var(--exp-soft);
      border-color: rgba(20, 184, 166, 0.18);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid rgba(129, 140, 248, 0.18);
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.55;
      outline: none;
      resize: vertical;
      background: rgba(255, 255, 255, 0.90);
      color: var(--text);
      transition: 0.18s ease;
    }

    textarea:focus {
      border-color: rgba(91, 108, 255, 0.50);
      box-shadow: 0 0 0 4px rgba(91, 108, 255, 0.12);
      background: rgba(255, 255, 255, 0.98);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 16px;
      min-height: 48px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
      color: #fff;
      box-shadow: 0 10px 18px rgba(91, 108, 255, 0.22);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #f0fdfa 0%, #eef2ff 100%);
      color: #1e293b;
      border: 1px solid rgba(125, 211, 252, 0.45);
    }

    .btn-light {
      background: rgba(255, 255, 255, 0.88);
      color: #1e293b;
      border: 1px solid var(--line);
    }

    .list-section { margin-top: 4px; }

    .mobile-only {
      display: none;
    }

    html {
      scroll-behavior: smooth;
    }

    .list-title {
      font-size: 17px;
      font-weight: 800;
      margin: 0 0 10px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 18px;
      padding: 14px;
      background: var(--card-strong);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .item-content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .item-time {
      color: var(--muted);
      font-size: 13px;
    }

    .delete-btn {
      background: linear-gradient(135deg, #fff1f2 0%, #fef2f2 100%);
      color: var(--danger);
      border: 1px solid #fecaca;
      min-height: 38px;
      padding: 8px 12px;
      font-size: 14px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      padding: 16px 8px;
      background: rgba(255,255,255,0.55);
      border: 1px dashed rgba(148, 163, 184, 0.28);
      border-radius: 16px;
    }

    @media (max-width: 720px) {
      .grid-2, .stats, .row, .toolbar { grid-template-columns: 1fr; }
      .title { font-size: 23px; }
      .clock { font-size: 22px; }
      .item-top { flex-direction: column; }
      .delete-btn { width: 100%; }
      .mobile-quick-nav { display: grid; }
      .mobile-only { display: block; }
      .desktop-pair { grid-template-columns: 1fr; }
    }
      .title { font-size: 23px; }
      .clock { font-size: 22px; }
      .item-top { flex-direction: column; }
      .delete-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <h1 class="title">个人双分区记录工具</h1>
        <div id="clock" class="clock">--:--:--</div>
      </div>
      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Idea 记录数</div>
          <div id="ideaCount" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">实验记录数</div>
          <div id="experimentCount" class="stat-value">0</div>
        </div>
      </div>
    </div>

    <div class="mobile-quick-nav">
      <button id="jumpToIdeaBtn" class="btn-primary">转到 Idea</button>
      <button id="jumpToExperimentBtn" class="btn-secondary">转到实验</button>
    </div>

    <div class="grid-2 desktop-pair">
      <div class="card" id="ideaSection">
        <div class="section-head">
          <h2 class="section-title">Idea 记录</h2>
          <span class="pill pill-idea">灵感专区</span>
        </div>
        <textarea id="ideaInput" placeholder="记录你突然想到的想法、点子、计划……"></textarea>
        <div class="row">
          <button id="saveIdeaBtn" class="btn-primary">保存 Idea</button>
          <button id="clearIdeaInputBtn" class="btn-light">清空输入</button>
        </div>
        <div class="toolbar">
          <button id="exportIdeaBtn" class="btn-secondary">导出 Idea</button>
          <button id="clearIdeaBtn" class="btn-light">清空 Idea</button>
        </div>
      </div>

      <div class="card" id="experimentSection">
        <div class="section-head">
          <h2 class="section-title">实验记录</h2>
          <span class="pill pill-exp">回溯专区</span>
        </div>
        <textarea id="experimentInput" placeholder="记录实验步骤、条件、观察结果、问题……"></textarea>
        <div class="row">
          <button id="saveExperimentBtn" class="btn-primary">保存实验记录</button>
          <button id="clearExperimentInputBtn" class="btn-light">清空输入</button>
        </div>
        <div class="toolbar">
          <button id="exportExperimentBtn" class="btn-secondary">导出实验记录</button>
          <button id="clearExperimentBtn" class="btn-light">清空实验记录</button>
        </div>
      </div>
    </div>

    <div class="grid-2 desktop-pair">
      <div class="card list-section" id="ideaHistorySection">
        <h3 class="list-title">Idea 历史</h3>
        <div id="ideaList" class="list"></div>
      </div>

      <div class="card list-section" id="experimentHistorySection">
        <h3 class="list-title">实验历史</h3>
        <div id="experimentList" class="list"></div>
      </div>
    </div>
  </div>

  <script>
    const IDEA_KEY = 'mobile_record_tool_ideas_v1';
    const EXPERIMENT_KEY = 'mobile_record_tool_experiments_v1';

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatDateTime(dateInput) {
      const d = new Date(dateInput);
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function escapeCsv(value) {
      const s = String(value ?? '');
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function loadRecords(key) {
      try {
        const raw = localStorage.getItem(key);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveRecords(key, records) {
      localStorage.setItem(key, JSON.stringify(records));
    }

    function sortDesc(arr) {
      return [...arr].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }

    function sortAsc(arr) {
      return [...arr].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    }

    function buildId() {
      return (window.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(16).slice(2);
    }

    let ideaRecords = loadRecords(IDEA_KEY);
    let experimentRecords = loadRecords(EXPERIMENT_KEY);

    const clockEl = document.getElementById('clock');
    const ideaCountEl = document.getElementById('ideaCount');
    const experimentCountEl = document.getElementById('experimentCount');
    const ideaInput = document.getElementById('ideaInput');
    const experimentInput = document.getElementById('experimentInput');
    const ideaListEl = document.getElementById('ideaList');
    const experimentListEl = document.getElementById('experimentList');

    function tickClock() {
      clockEl.textContent = formatDateTime(new Date());
    }

    function updateCounts() {
      ideaCountEl.textContent = String(ideaRecords.length);
      experimentCountEl.textContent = String(experimentRecords.length);
    }

    function renderList(listEl, records, type) {
      const view = sortDesc(records);
      if (view.length === 0) {
        listEl.innerHTML = '<div class="empty">暂无内容</div>';
        return;
      }

      listEl.innerHTML = view.map(item => `
        <div class="item">
          <div class="item-top">
            <div style="flex:1; min-width:0;">
              <div class="item-content">${escapeHtml(item.content)}</div>
              <div class="item-time">${formatDateTime(item.created_at)}</div>
            </div>
            <button class="delete-btn" data-type="${type}" data-id="${item.id}">删除</button>
          </div>
        </div>
      `).join('');
    }

    function render() {
      updateCounts();
      renderList(ideaListEl, ideaRecords, 'idea');
      renderList(experimentListEl, experimentRecords, 'experiment');
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          const type = btn.getAttribute('data-type');
          if (type === 'idea') {
            ideaRecords = ideaRecords.filter(r => r.id !== id);
            saveRecords(IDEA_KEY, ideaRecords);
          } else {
            experimentRecords = experimentRecords.filter(r => r.id !== id);
            saveRecords(EXPERIMENT_KEY, experimentRecords);
          }
          render();
        });
      });
    }

    function saveOne(type) {
      const input = type === 'idea' ? ideaInput : experimentInput;
      const key = type === 'idea' ? IDEA_KEY : EXPERIMENT_KEY;
      const content = input.value.trim();
      if (!content) {
        alert('请输入内容后再保存。');
        return;
      }
      const item = { id: buildId(), content, created_at: new Date().toISOString() };
      if (type === 'idea') {
        ideaRecords.push(item);
        saveRecords(key, ideaRecords);
      } else {
        experimentRecords.push(item);
        saveRecords(key, experimentRecords);
      }
      input.value = '';
      render();
    }

    function clearAll(type) {
      if (type === 'idea') {
        if (!ideaRecords.length) return;
        if (!confirm('确定清空全部 Idea 记录吗？')) return;
        ideaRecords = [];
        saveRecords(IDEA_KEY, ideaRecords);
      } else {
        if (!experimentRecords.length) return;
        if (!confirm('确定清空全部实验记录吗？')) return;
        experimentRecords = [];
        saveRecords(EXPERIMENT_KEY, experimentRecords);
      }
      render();
    }

    function exportCsv(type) {
      const records = type === 'idea' ? ideaRecords : experimentRecords;
      const ordered = sortAsc(records);
      if (ordered.length === 0) {
        alert('当前没有记录可导出。');
        return;
      }
      const categoryName = type === 'idea' ? 'Idea记录' : '实验记录';
      const header = ['序号', '记录时间', '记录内容', '记录ID'];
      const lines = [header.join(',')];
      ordered.forEach((item, idx) => {
        lines.push([
          idx + 1,
          escapeCsv(formatDateTime(item.created_at)),
          escapeCsv(item.content),
          escapeCsv(item.id)
        ].join(','));
      });
      const csv = '\uFEFF' + lines.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${categoryName}_${formatDateTime(new Date()).replace(/[: ]/g, '_')}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById('saveIdeaBtn').addEventListener('click', () => saveOne('idea'));
    document.getElementById('jumpToIdeaBtn').addEventListener('click', () => {
      document.getElementById('ideaSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
      setTimeout(() => ideaInput.focus(), 250);
    });
    document.getElementById('jumpToExperimentBtn').addEventListener('click', () => {
      document.getElementById('experimentSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
      setTimeout(() => experimentInput.focus(), 250);
    });
    document.getElementById('saveExperimentBtn').addEventListener('click', () => saveOne('experiment'));
    document.getElementById('clearIdeaInputBtn').addEventListener('click', () => { ideaInput.value = ''; });
    document.getElementById('clearExperimentInputBtn').addEventListener('click', () => { experimentInput.value = ''; });
    document.getElementById('clearIdeaBtn').addEventListener('click', () => clearAll('idea'));
    document.getElementById('clearExperimentBtn').addEventListener('click', () => clearAll('experiment'));
    document.getElementById('exportIdeaBtn').addEventListener('click', () => exportCsv('idea'));
    document.getElementById('exportExperimentBtn').addEventListener('click', () => exportCsv('experiment'));

    ideaInput.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveOne('idea');
    });
    experimentInput.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveOne('experiment');
    });

    tickClock();
    setInterval(tickClock, 1000);
    render();
  </script>
</body>
</html>
