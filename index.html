<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>个人记录工具</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #0f172a;
      --primary-2: #1e293b;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      padding: max(16px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
      padding: 16px;
      margin-bottom: 14px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .clock {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin: 6px 0 10px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .label {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 10px;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
      resize: vertical;
      background: #fff;
    }

    textarea:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      min-height: 48px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-secondary {
      background: #eef2ff;
      color: #1e293b;
      border: 1px solid #dbeafe;
    }

    .btn-light {
      background: #f8fafc;
      color: #1e293b;
      border: 1px solid var(--line);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #334155;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .item-content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .item-time {
      color: var(--muted);
      font-size: 13px;
    }

    .delete-btn {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid #fecaca;
      min-height: 38px;
      padding: 8px 12px;
      font-size: 14px;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      padding: 14px 8px;
    }

    .tip {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .title { font-size: 22px; }
      .clock { font-size: 24px; }
      .row, .toolbar { grid-template-columns: 1fr; }
      .item-top { flex-direction: column; }
      .delete-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">个人记录工具</h1>
      <div id="clock" class="clock">--:--:--</div>
      <div class="meta">
        <div class="badge">本地保存</div>
        <div class="sub">记录总数：<span id="count">0</span></div>
      </div>
      <div class="tip">当前版本为手机版本，数据保存在当前浏览器本地。导出时将按时间正序排列。</div>
    </div>

    <div class="card">
      <div class="label">新增记录</div>
      <textarea id="textInput" placeholder="请输入你想记录的内容……"></textarea>
      <div class="row">
        <button id="saveBtn" class="btn-primary">保存记录</button>
        <button id="clearInputBtn" class="btn-light">清空输入</button>
      </div>
    </div>

    <div class="card">
      <div class="label">操作区</div>
      <div class="toolbar">
        <button id="exportBtn" class="btn-secondary">导出 Excel 兼容文件</button>
        <button id="clearAllBtn" class="btn-light">清空全部记录</button>
      </div>
      <div class="tip">说明：为了保证 iPhone 上能直接保存并导入 Excel，这里导出的是 CSV 文件，Excel 可以直接打开。</div>
    </div>

    <div class="card">
      <div class="label">历史记录</div>
      <div id="list" class="list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'mobile_record_tool_v1';

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatDateTime(dateInput) {
      const d = new Date(dateInput);
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function escapeCsv(value) {
      const s = String(value ?? '');
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    let records = loadRecords();

    const clockEl = document.getElementById('clock');
    const countEl = document.getElementById('count');
    const listEl = document.getElementById('list');
    const textInput = document.getElementById('textInput');
    const saveBtn = document.getElementById('saveBtn');
    const exportBtn = document.getElementById('exportBtn');
    const clearInputBtn = document.getElementById('clearInputBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    function tickClock() {
      clockEl.textContent = formatDateTime(new Date());
    }

    function updateCount() {
      countEl.textContent = String(records.length);
    }

    function sortDesc(arr) {
      return [...arr].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }

    function sortAsc(arr) {
      return [...arr].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    }

    function render() {
      const view = sortDesc(records);
      updateCount();

      if (view.length === 0) {
        listEl.innerHTML = '<div class="empty">暂时还没有记录。</div>';
        return;
      }

      listEl.innerHTML = view.map(item => `
        <div class="item">
          <div class="item-top">
            <div style="flex:1; min-width:0;">
              <div class="item-content">${escapeHtml(item.content)}</div>
              <div class="item-time">${formatDateTime(item.created_at)}</div>
            </div>
            <button class="delete-btn" data-id="${item.id}">删除</button>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          records = records.filter(r => r.id !== id);
          saveRecords(records);
          render();
        });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function saveRecord() {
      const content = textInput.value.trim();
      if (!content) {
        alert('请输入内容后再保存。');
        return;
      }

      const id = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
      const item = {
        id,
        content,
        created_at: new Date().toISOString()
      };

      records.push(item);
      saveRecords(records);
      textInput.value = '';
      render();
    }

    function exportCsv() {
      const ordered = sortAsc(records);
      if (ordered.length === 0) {
        alert('当前没有记录可导出。');
        return;
      }

      const header = ['序号', '记录时间', '记录内容', '记录ID'];
      const lines = [header.join(',')];

      ordered.forEach((item, idx) => {
        lines.push([
          idx + 1,
          escapeCsv(formatDateTime(item.created_at)),
          escapeCsv(item.content),
          escapeCsv(item.id)
        ].join(','));
      });

      const csv = '\uFEFF' + lines.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `个人记录导出_${formatDateTime(new Date()).replace(/[: ]/g, '_')}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    saveBtn.addEventListener('click', saveRecord);
    exportBtn.addEventListener('click', exportCsv);
    clearInputBtn.addEventListener('click', () => { textInput.value = ''; });
    clearAllBtn.addEventListener('click', () => {
      if (!records.length) return;
      const ok = confirm('确定要清空全部记录吗？此操作不可撤销。');
      if (!ok) return;
      records = [];
      saveRecords(records);
      render();
    });

    textInput.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        saveRecord();
      }
    });

    tickClock();
    setInterval(tickClock, 1000);
    render();
  </script>
</body>
</html>
